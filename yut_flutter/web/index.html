<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="./">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Yut Game">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Yut Game</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Full screen HTML5 CSS Loader -->
  <div id="loading-indicator" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #1E262C; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; font-family: sans-serif; transition: opacity 0.3s ease-in-out; opacity: 1;">
    <img src="favicon.png" style="width: 80px; height: 80px; margin-bottom: 24px; animation: pulse 1.8s infinite ease-in-out;">
    <div style="color: #ffffff; font-size: 22px; font-weight: bold; margin-bottom: 8px; letter-spacing: 0.5px;">Yut Game</div>
    <div style="color: #7F8C8D; font-size: 14px;">Loading game assets...</div>
    <style>
      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }
    </style>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.flutterWebRenderer = "html";

    var bgMusic = null;
    function playBackgroundMusic() {
      if (!bgMusic) {
        bgMusic = new Audio('assets/assets/audio/song.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.3;
      }
      bgMusic.play().catch(function(error) {
        console.log("Audio autoplay blocked by browser policy. Will retry on next interaction.");
      });
    }
    function pauseBackgroundMusic() {
      if (bgMusic) {
        bgMusic.pause();
      }
    }
    function removeLoader() {
      var loader = document.getElementById('loading-indicator');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(function() {
          loader.remove();
        }, 300);
      }
    }
    function triggerGoogleAuth(clientId) {
      const redirectUri = window.location.origin + window.location.pathname;
      const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=id_token&scope=email%20profile&nonce=yutgame`;
      
      const popup = window.open(url, "Google Sign In", "width=500,height=600");
      
      return new Promise((resolve, reject) => {
        const timer = setInterval(() => {
          try {
            if (!popup || popup.closed) {
              clearInterval(timer);
              reject("Popup closed by user");
              return;
            }
            
            const href = popup.location.href;
            if (href && href.includes("id_token=")) {
              clearInterval(timer);
              const params = new URLSearchParams(href.split("#")[1] || href.split("?")[1]);
              const jwt = params.get("id_token");
              const payload = JSON.parse(atob(jwt.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
              popup.close();
              resolve(JSON.stringify({
                googleId: payload.sub,
                email: payload.email,
                name: payload.name,
                token: jwt
              }));
            }
          } catch (_) {
            // Cross-origin access errors expected during consent page redirecting
          }
        }, 500);
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
